<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Caster</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Screen Caster</h1>
            <p>Share your PC screen instantly to any mobile device.</p>
        </header>

        <div class="card-grid">
            <div class="card" onclick="location.href='host.html'">
                <div class="card-icon">🖥️</div>
                <h2>Share Screen</h2>
                <p>Cast this computer's screen and get a room code.</p>
                <button class="btn primary">Start Hosting</button>
            </div>

            <div class="card" onclick="location.href='viewer.html'">
                <div class="card-icon">📱</div>
                <h2>View Screen</h2>
                <p>Enter a room code to view a shared screen.</p>
                <button class="btn secondary">Join Room</button>
            </div>
        </div>
    </div>
</body>
</html>
