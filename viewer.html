<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Screen - Screen Caster</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Include PeerJS -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body class="viewer-body">
    <div class="viewer-ui" id="viewerUI">
        <header>
            <a href="index.html" class="back-link">← Back</a>
            <h1>Join Room</h1>
        </header>

        <div class="join-form">
            <input type="text" id="roomCodeInput" placeholder="Enter Room Code (e.g. 123456)" autocomplete="off">
            <button id="joinBtn" class="btn primary">Connect</button>
            <p class="status" id="statusText"></p>
        </div>
    </div>

    <!-- The video container that will take over the screen once connected -->
    <div class="full-screen-video" id="videoContainer" style="display: none;">
        <video id="remoteVideo" autoplay playsinline></video>
        <button id="disconnectBtn" class="floating-btn">Disconnect</button>
    </div>

    <script src="js/viewer.js"></script>
</body>
</html>
