<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Screen - Screen Caster</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Include PeerJS -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="container host-container">
        <header>
            <a href="index.html" class="back-link">← Back</a>
            <h1>Share Your Screen</h1>
            <p>Your room code is below. Enter this on your mobile device.</p>
        </header>

        <div class="room-code-display">
            <span class="label">ROOM CODE</span>
            <div class="code" id="roomCode">Generating...</div>
            <p class="status" id="statusText">Waiting for PeerJS connection...</p>
        </div>

        <div class="video-container">
            <video id="screenPreview" autoplay muted playsinline></video>
            <div class="overlay" id="videoOverlay">
                <button id="startShareBtn" class="btn primary large">Start Sharing</button>
            </div>
        </div>
    </div>
    <script src="js/host.js"></script>
</body>
</html>
